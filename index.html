<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大鱼吃小鱼 (Big Fish Eat Small Fish)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="overlay">
                <h1>大鱼吃小鱼</h1>
                <p>吞噬小鱼不断成长，避开大鱼和墙壁尖刺！</p>
                <p>操作：鼠标引导方向，小鱼会自动前进</p>
                <button id="start-btn">进入海洋</button>
            </div>
            <div id="game-over-screen" class="overlay hidden">
                <h1>进化终止</h1>
                <p>最终体型：<span id="final-level">1</span></p>
                <p>得分：<span id="final-score">0</span></p>
                <button id="restart-btn">重新进化</button>
            </div>
            <div id="hud">
                <div id="level-board">等级: 1</div>
                <div id="score-board">分数: 0</div>
